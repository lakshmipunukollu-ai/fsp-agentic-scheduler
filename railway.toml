# Railway deployment: single Node service (API + static frontend)
# Add a Postgres plugin in the dashboard and link DATABASE_URL to this service.

[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
